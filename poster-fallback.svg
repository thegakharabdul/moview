<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Poster unavailable</title>
  <desc id="desc">Fallback poster shown when a movie image cannot be loaded.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f1117" />
      <stop offset="100%" stop-color="#1b1f2b" />
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)" />
  <rect x="36" y="36" width="528" height="828" rx="24" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
  <text x="300" y="390" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="44" font-weight="700">Poster</text>
  <text x="300" y="450" text-anchor="middle" fill="#ffe0b3" font-family="Arial, sans-serif" font-size="44" font-weight="700">Not Available</text>
  <text x="300" y="770" text-anchor="middle" fill="#d7d7d7" font-family="Arial, sans-serif" font-size="22">Moview</text>
</svg>
